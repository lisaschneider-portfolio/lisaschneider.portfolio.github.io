<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Detail – Lisa Schneider</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-[#f9f7f2] text-[#1a1a1a] font-inter">
    <div class="a11y-toggle-wrap hidden md:block">
        <button type="button" class="a11y-toggle" data-wcag-toggle aria-label="Toggle WCAG accessibility mode" aria-pressed="false">
            <span class="a11y-switch-track" aria-hidden="true"><span class="a11y-switch-thumb"></span></span>
        </button>
    </div>

    <header class="w-full px-6 py-8">
        <nav class="grid grid-cols-3 items-center max-w-xl mx-auto bg-transparent">
            <div class="text-left flex items-center">
                <button type="button" class="md:hidden inline-flex items-center justify-center border-2 border-stone-800 rounded-full px-3 py-1.5 text-[11px] font-extrabold uppercase tracking-wider text-stone-800" data-mobile-menu-toggle aria-expanded="false" aria-controls="mobile-nav-menu-project-detail">
                    Menu
                </button>
                <a href="projects.html" class="hidden md:inline text-xs font-extrabold tracking-tight text-stone-800 hover:opacity-60 transition-opacity">Projects</a>
            </div>
            <div class="text-center flex justify-center">
                <a href="index.html" class="inline-flex items-center justify-center border-2 border-stone-800 rounded-full p-1 hover:bg-stone-100/50 transition-colors">
                    <canvas id="nav-particle-canvas" class="block cursor-pointer"></canvas>
                </a>
            </div>
            <div class="text-right flex justify-end items-center gap-2">
                <a href="sidequests.html" class="hidden md:inline text-xs font-extrabold tracking-tight text-stone-800 hover:opacity-60 transition-opacity">Side quests</a>
                <button type="button" class="a11y-toggle md:hidden" data-wcag-toggle aria-label="Toggle WCAG accessibility mode" aria-pressed="false">
                    <span class="a11y-switch-track" aria-hidden="true"><span class="a11y-switch-thumb"></span></span>
                </button>
            </div>
        </nav>
        <div id="mobile-nav-menu-project-detail" class="hidden md:hidden max-w-xl mx-auto mt-3 rounded-2xl border-2 border-stone-800 bg-white px-4 py-3 shadow-[4px_4px_0_0_#1a1a1a] relative z-50">
            <div class="flex flex-col gap-2 text-left">
                <a href="projects.html" class="text-xs font-extrabold uppercase tracking-wider text-stone-800">Projects</a>
                <a href="sidequests.html" class="text-xs font-extrabold uppercase tracking-wider text-stone-800">Side quests</a>
            </div>
        </div>
    </header>

    <main class="w-full max-w-5xl mx-auto px-6 mt-20 pb-24">
        <a href="projects.html" class="text-xs font-extrabold uppercase tracking-wider text-stone-500 hover:text-stone-800 transition-colors mb-8 block">← Back to projects</a>

        <!-- This article MUST have id="project-detail" -->
        <article id="project-detail" class="hidden space-y-8 rounded-[2rem] border border-stone-200 bg-white p-8 shadow-lg">
            <div id="project-tags" class="flex flex-wrap gap-2"></div>
            <h1 id="project-title" class="text-4xl md:text-5xl font-black uppercase"></h1>
            <p id="project-subtitle" class="text-stone-500 text-lg"></p>

            <img id="project-image" class="w-full aspect-[16/9] object-cover rounded-[2rem] border-2 border-stone-800 shadow-[8px_8px_0_0_#1a1a1a]" src="" alt="Project Image" />

            <!-- Metadata Grid -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 border-y border-stone-200 py-6">
                <div><p class="text-xs font-bold text-stone-400 uppercase">Role</p><p id="detail-role" class="font-bold text-sm"></p></div>
                <div><p class="text-xs font-bold text-stone-400 uppercase">Timeline</p><p id="detail-timeline" class="font-bold text-sm"></p></div>
                <div><p class="text-xs font-bold text-stone-400 uppercase">Tools</p><p id="detail-tools" class="font-bold text-sm"></p></div>
                <div><p class="text-xs font-bold text-stone-400 uppercase">Client</p><p id="detail-client" class="font-bold text-sm"></p></div>
            </div>

            <div class="space-y-2">
                <h2 class="text-2xl font-black uppercase">Overview</h2>
                <p id="project-description" class="text-stone-700"></p>
                <div id="cta-container" class="my-4"></div>
            </div>

            <h2 class="text-2xl font-black uppercase mb-0">Challenge</h2>
            <p id="project-challenge" class="text-stone-700"></p>

            <h2 class="text-2xl font-black uppercase mb-0">Process</h2>
            <p id="project-process" class="text-stone-700"></p>
            <div id="process-gallery" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

            <h2 class="text-2xl font-black uppercase mb-0">Results</h2>
            <p id="project-results" class="text-stone-700"></p>
        </article>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const projectId = params.get('id');

        function renderProject(project) {
            console.log("Rendering project:", project); // Check console to see if data arrives
            
            // Populate content
            document.getElementById('project-title').textContent = project.title || "";
            document.getElementById('project-subtitle').textContent = project.subtitle || "";
            document.getElementById('project-description').textContent = project.description || "";
            document.getElementById('project-challenge').textContent = project.challenge || "";
            document.getElementById('project-process').textContent = project.process || "";
            document.getElementById('project-results').textContent = project.results || "";
            document.getElementById('project-image').src = project.heroImage || "";
            
            document.getElementById('detail-role').textContent = project.role || "";
            document.getElementById('detail-timeline').textContent = project.timeline || "";
            document.getElementById('detail-tools').textContent = Array.isArray(project.tools) ? project.tools.join(', ') : project.tools;
            document.getElementById('detail-client').textContent = project.client || "";

            // Render Figma Button
            const cta = document.getElementById('cta-container');
            if (project.figmaUrl) {
                cta.innerHTML = `<a href="${project.figmaUrl}" target="_blank" class="inline-flex items-center gap-2 bg-[#16a34a] text-white px-8 py-4 rounded-full font-bold hover:bg-[#166534] transition-colors shadow-[4px_4px_0_0_#1a1a1a]">View Figma Prototype</a>`;
            }

            // Render Tags
            document.getElementById('project-tags').innerHTML = (project.tags || []).map(t => 
                `<span class="bg-[#dcfce7] text-[#16a34a] px-4 py-1.5 rounded-full text-xs font-bold uppercase border border-[#16a34a]">${t}</span>`
            ).join('');

            // Render Gallery
            const gallery = document.getElementById('process-gallery');
            if (project.processImages) {
                gallery.innerHTML = project.processImages.map(img => 
                    `<div class="border-2 border-dashed border-gray-300 p-4 rounded-3xl bg-stone-50 shadow-[4px_4px_0_0_#e5e7eb]">
                        <img src="${img}" class="w-full h-auto rounded-2xl" alt="Process Image" />
                    </div>`
                ).join('');
            }

            // SHOW the article
            document.getElementById('project-detail').classList.remove('hidden');
        }

        fetch('projects.json')
            .then(res => res.json())
            .then(data => {
                const project = data[projectId];
                if (project) {
                    renderProject(project);
                } else {
                    console.error("Project ID not found in JSON:", projectId);
                }
            })
            .catch(err => console.error("Error loading JSON:", err));
    </script>
    <script src="particle-text.js"></script>
    <script src="accessibility-mode.js"></script>
</body>
</html>
