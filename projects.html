<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects – Lisa Schneider</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playpen+Sans:wght@600;800&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .project-card {
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                        box-shadow 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .project-card:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 12px 12px 0 0 #1a1a1a;
        }
        .project-tag {
            background: #dcfce7;
            color: #16a34a;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            border: 1.5px solid #16a34a;
        }
    </style>
</head>
<body class="min-h-screen bg-[#f9f7f2] text-[#1a1a1a] font-inter">
    <div class="a11y-toggle-wrap hidden md:block">
        <button type="button" class="a11y-toggle" data-wcag-toggle aria-label="Toggle WCAG accessibility mode" aria-pressed="false">
            <span class="a11y-switch-track" aria-hidden="true"><span class="a11y-switch-thumb"></span></span>
        </button>
    </div>

    <header class="w-full px-6 py-8">
        <nav class="grid grid-cols-3 items-center max-w-xl mx-auto bg-transparent">
            <div class="text-left flex items-center">
                <button type="button" class="md:hidden inline-flex items-center justify-center border-2 border-stone-800 rounded-full px-3 py-1.5 text-[11px] font-extrabold uppercase tracking-wider text-stone-800" data-mobile-menu-toggle aria-expanded="false" aria-controls="mobile-nav-menu-projects">
                    Menu
                </button>
                <a href="projects.html" class="hidden md:inline text-xs font-extrabold tracking-tight text-stone-800 hover:opacity-60 transition-opacity">Projects</a>
            </div>
            <div class="text-center flex justify-center">
                <a href="index.html" class="inline-flex items-center justify-center border-2 border-stone-800 rounded-full p-1 hover:bg-stone-100/50 transition-colors">
                    <canvas id="nav-particle-canvas" class="block cursor-pointer"></canvas>
                </a>
            </div>
            <div class="text-right flex justify-end items-center gap-2">
                <a href="sidequests.html" class="hidden md:inline text-xs font-extrabold tracking-tight text-stone-800 hover:opacity-60 transition-opacity">Side quests</a>
                <button type="button" class="a11y-toggle md:hidden" data-wcag-toggle aria-label="Toggle WCAG accessibility mode" aria-pressed="false">
                    <span class="a11y-switch-track" aria-hidden="true"><span class="a11y-switch-thumb"></span></span>
                </button>
            </div>
        </nav>
        <div id="mobile-nav-menu-projects" class="hidden md:hidden max-w-xl mx-auto mt-3 rounded-2xl border-2 border-stone-800 bg-white px-4 py-3 shadow-[4px_4px_0_0_#1a1a1a] relative z-50">
            <div class="flex flex-col gap-2 text-left">
                <a href="projects.html" class="text-xs font-extrabold uppercase tracking-wider text-stone-800">Projects</a>
                <a href="sidequests.html" class="text-xs font-extrabold uppercase tracking-wider text-stone-800">Side quests</a>
            </div>
        </div>
    </header>

    <main class="w-full max-w-5xl mx-auto px-6 mt-20">
        <section class="flex flex-col items-center text-center space-y-3 mb-16">
            <h2 class="text-4xl md:text-5xl font-black tracking-tight uppercase">Projects</h2>
            <p class="text-stone-500 font-medium text-sm max-w-md">A selection of my recent work</p>
        </section>

        <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto pb-20"></div>
        <div id="projects-error" class="hidden rounded-3xl border border-green-200 bg-green-50 p-6 text-green-800 max-w-4xl mx-auto mb-10">Could not load projects. Please check your JSON file and refresh.</div>

        <!-- Back link -->
        <div class="text-center pb-16">
            <a href="index.html" class="inline-flex items-center gap-2 text-stone-500 hover:text-stone-800 font-extrabold text-xs uppercase tracking-wider transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M7 16l-4-4m0 0l4-4m-4 4h18"/></svg>
                Back to home
            </a>
        </div>
    </main>

    <script>
        const grid = document.getElementById('projects-grid');
        const errorMessage = document.getElementById('projects-error');

        function normalizeProjects(data) {
            if (Array.isArray(data)) {
                return data.map(project => ({ id: project.id || '', ...project }));
            }
            return Object.entries(data).map(([id, project]) => ({ id, ...project }));
        }

        function renderProjectCard(project) {
            const card = document.createElement('a');
            card.href = `project-layout.html?id=${encodeURIComponent(project.id)}`;
            card.className = 'project-card block bg-white rounded-[1.75rem] border-2 border-stone-800 shadow-[8px_8px_0_0_#1a1a1a] overflow-hidden group';
            const accentBg = project.accentBg || 'bg-stone-200';
            const gradient = project.gradient || 'bg-gradient-to-br from-stone-100 to-stone-300';
            const iconBackground = project.iconBackground || 'bg-stone-400/30';
            const iconBorder = project.iconBorder || 'border-stone-500/40';
            const iconSvg = project.iconSvg || '<svg class="w-8 h-8 text-stone-500/60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>';
            const imageSrc = project.imagePath || project.heroImage || '';

            card.innerHTML = `
                <div class="relative h-72 overflow-hidden bg-stone-200">
                    ${imageSrc ? `<img src="${imageSrc}" alt="${project.title || 'Project image'}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" />` : `
                        <div class="w-full h-full ${gradient} flex items-center justify-center p-6">
                            <div class="w-full h-full ${iconBackground} rounded-2xl border-2 border-dashed ${iconBorder} flex items-center justify-center">
                                ${iconSvg}
                            </div>
                        </div>
                    `}
                </div>
                <div class="p-6 space-y-3">
                    <div class="flex flex-wrap gap-2">
                        ${(project.tags || []).map(tag => `<span class="project-tag">${tag}</span>`).join('')}
                    </div>
                    <h3 class="text-xl font-black tracking-tight uppercase">${project.title || 'Untitled Project'}</h3>
                    <div class="pt-2 flex items-center gap-2 text-[#16a34a] font-extrabold text-xs uppercase tracking-wider group-hover:gap-3 transition-all">
                        View Project
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
                    </div>
                </div>
            `;

            grid.appendChild(card);
        }

        function loadProjects() {
            fetch('projects.json')
                .then(response => {
                    if (!response.ok) throw new Error('Project data not available');
                    return response.json();
                })
                .then(data => {
                    const projects = normalizeProjects(data);
                    if (!projects.length) throw new Error('No projects found');
                    projects.forEach(renderProjectCard);
                })
                .catch(error => {
                    console.error(error);
                    errorMessage.classList.remove('hidden');
                });
        }

        loadProjects();
    </script>
    <script src="particle-text.js"></script>
    <script src="accessibility-mode.js"></script>
    <footer class="w-full mt-12 py-12 flex flex-col items-center space-y-1 border-t border-stone-200/40">
        <div class="footer-brand text-center text-stone-800 select-none">
            lisa schneider
        </div>
    </footer>
</body>
</html>
